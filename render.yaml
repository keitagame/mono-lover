services:
  - type: web
    name: mono-lover
    env: node
    region: singapore
    buildCommand: "npm install"
    startCommand: "npm start"
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sns-db
          property: connectionString

databases:
  - name: sns-db
    plan: free
